name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          pyinstaller build/capturevault.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          $version = (Get-Content version.txt).Trim()
          (Get-Content installer/CaptureVault.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" | Set-Content installer/CaptureVault.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/CaptureVault.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CaptureVault.exe
            dist/installer/CaptureVaultSetup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
